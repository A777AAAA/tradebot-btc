version: "3.8"
services:
  tradebot_new:
    image: tradebot
    container_name: tradebot_new
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
    volumes:
      - /root/TradingCons/config.py:/app/config.py
      - /root/tradebot_data:/app/data
      - btc_models:/app/models
    env_file:
      - .env
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  btc_models:
